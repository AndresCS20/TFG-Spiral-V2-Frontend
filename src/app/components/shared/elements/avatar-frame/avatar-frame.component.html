<div class="avatarf" [class]="avatarBodyClass">
  <img [src]="profile_picture || default_avatar" alt="Avatar de usuario" class="avatar-image w-full h-full bg-base-100">
  
  @if (frame_name != "none") {
    <img [src]="selectedFrame?.attributes.image"
      alt="Marco de avatar"
      class="avatar-frame absolute"
      [class]="avatarClass">
  }
</div>
